<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasir | SANDIKALE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="page">

<h1 class="pageTitle">Kasir</h1>

<div class="tableCard" style="padding:20px;">

<div class="toolbar">

<select id="customerKasir" class="searchBox">
<option value="">Pelanggan Umum (Non Member)</option>
</select>

<select id="pilihProduk" class="searchBox">
<option value="">Pilih Produk</option>
</select>

<button class="primaryBtn" id="tambahKeranjang">
Tambah
</button>

</div>

<table>

<thead>

<tr>

<th>Produk</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>

</tr>

</thead>

<tbody id="keranjangTable">

<tr>

<td colspan="4" class="empty">
Belum ada produk
</td>

</tr>

</tbody>

</table>

<hr style="margin:25px 0">

<div style="display:flex;flex-direction:column;gap:15px;max-width:350px;margin-left:auto;">

<label>Total</label>

<h2 id="totalBayar">Rp 0</h2>

<label>Bayar</label>

<input
type="number"
id="bayar"
class="searchBox"
placeholder="Masukkan nominal">

<label>Kembalian</label>

<h2 id="kembalian">Rp 0</h2>

<button class="primaryBtn" id="simpanTransaksi">
Simpan Transaksi
</button>

<button class="primaryBtn" id="printNota">
🖨 Cetak Nota
</button>

</div>

</div>

</div>

<script src="../app.js"></script>

</body>
</html>
