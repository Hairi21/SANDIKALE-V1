<!DOCTYPE html>
<html>
<head>
...
<link rel="stylesheet" href="../style.css">
</head>
<body>
    <section class="page">

    <h1 class="pageTitle">Master Kategori</h1>

    <div class="toolbar">

        <button class="primaryBtn" id="openCategoryModal">
            + Tambah Kategori
        </button>

        <input
            type="text"
            class="searchBox"
            placeholder="Cari kategori..."
        >

    </div>

    <div class="tableCard">

        <table>

            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Kategori</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="kategoriTable">

                <tr>
                    <td colspan="3" class="empty">
                        Belum ada kategori
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</section>
<!-- MODAL TAMBAH KATEGORI -->
<div class="modal" id="categoryModal">

    <div class="modalContent">

        <h2>Tambah Kategori</h2>

        <input
            type="text"
            id="namaKategori"
            placeholder="Nama Kategori"
        >

        <div class="modalAction">

            <button id="closeCategoryModal">
                Batal
            </button>

            <button class="primaryBtn" id="saveCategory">
                Simpan
            </button>

        </div>

    </div>

</div>
<script src="../app.js"></script>
</body>
</html>
