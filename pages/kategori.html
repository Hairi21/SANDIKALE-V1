<section class="page">

    <h1 class="pageTitle">Master Kategori</h1>

    <div class="toolbar">

        <button class="primaryBtn" id="openCategoryModal">
            + Tambah Kategori
        </button>

        <input
            type="text"
            class="searchBox"
            placeholder="Cari kategori..."
        >

    </div>

    <div class="tableCard">

        <table>

            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Kategori</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="kategoriTable">

                <tr>
                    <td colspan="3" class="empty">
                        Belum ada kategori
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</section>
