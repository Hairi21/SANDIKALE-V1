<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Produk | SANDIKALE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="page">

<h1 class="pageTitle">Master Produk</h1>

<div class="toolbar">
<button class="primaryBtn" id="openModal">
    + Tambah Produk
</button>
<input
type="text"
placeholder="Cari produk..."
class="searchBox">


</div>

<div class="tableCard">

<table>

<thead>

<tr>

<th>Kode</th>

<th>Produk</th>

<th>Kategori</th>

<th>Harga</th>

<th>Stok</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="produkTable">

<tr>

<td colspan="7" class="empty">

Belum ada produk

</td>

</tr>

</tbody>

</table>

</div>

</div>
<!-- MODAL TAMBAH PRODUK -->
<div class="modal" id="productModal">

    <div class="modalContent">

        <h2>Tambah Produk</h2>

        <input
    type="text"
    id="kodeProduk"
    placeholder="Kode Produk">

<input
    type="text"
    id="namaProduk"
    placeholder="Nama Produk">

<select id="kategoriProduk">
    <option value="">Pilih Kategori</option>
</select>

<input
    type="number"
    id="hargaProduk"
    placeholder="Harga">

<input
    type="number"
    id="stokProduk"
    placeholder="Stok">
        <div class="modalAction">

            <button class="secondaryBtn" id="closeModal">
                Batal
            </button>

          <button class="primaryBtn" id="saveProduct">
    Simpan
          </button>  

        </div>

    </div>

</div>
    <script src="../app.js"></script>
</body>

</html>
