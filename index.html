<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SANDIKALE V1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrapper">

    <img src="assets/logo.png" class="logo">

    <h1>SANDIKALE</h1>

    <p class="subtitle">
        Luxury POS System
    </p>

    <div class="dashboard">

        <div class="card">
            <h2>Produk</h2>
            <span id="totalProduk">0</span>
        </div>

        <div class="card">
            <h2>Customer</h2>
            <span id="totalCustomer">0</span>
        </div>

        <div class="card">
            <h2>Transaksi</h2>
            <span id="totalTransaksi">0</span>
        </div>

        <div class="card">
            <h2>Penjualan</h2>
            <span id="totalPenjualan">Rp 0</span>
        </div>

    </div>

    <div class="menu">

        <button>MASTER PRODUK</button>

        <button>MASTER CUSTOMER</button>

        <button>KASIR</button>

        <button>TRANSAKSI</button>

        <button>LAPORAN</button>

        <button>SETTING</button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
